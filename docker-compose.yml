version: "3.9"
services:
  backend:
    build: ./backend
    container_name: laporsampah-backend
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: laporsampah-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always